name: Build iOS (Simple)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Build project
      run: |
        xcodebuild -project MyiOSApp.xcodeproj \
          -scheme MyiOSApp \
          -sdk iphonesimulator \
          -configuration Debug \
          build
    
    - name: Run tests
      run: |
        xcodebuild test \
          -project MyiOSApp.xcodeproj \
          -scheme MyiOSApp \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 14'
